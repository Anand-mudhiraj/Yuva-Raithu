spring:
  application:
    name: yuva_raithu_backend
  datasource:
    url: jdbc:postgresql://localhost:5432/yuva_raithu_db
    username: yuva_user
    password: yuva_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: yuvaRaithuSuperSecretKeyForJwtGeneration2026ThisMustBeLongEnoughForHS512Algorithm
  expirationMs: 86400000 # 24 hours

server:
  port: 8080
