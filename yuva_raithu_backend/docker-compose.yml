version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: yuva_raithu_postgres
    environment:
      POSTGRES_USER: yuva_user
      POSTGRES_PASSWORD: yuva_password
      POSTGRES_DB: yuva_raithu_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: yuva_raithu_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
